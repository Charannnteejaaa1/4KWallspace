</head>

<body>

<header>
<h1><a href="index.html" class="logo">4KWallSpace</a></h1>

<nav>

<a href="anime.html">Anime</a>

<a href="fourk.html">4K</a>
</nav>
</header>

<section class="hero">
<h2>Car Wallpapers</h2>
</section>

<section class="wallpaper-grid">

<div class="wallpaper">
<img src="images/formula/f1-1.jpg" alt="Ferrari Formula 1 wallpaper">
</div>

<div class="wallpaper">
<img src="images/formula/f1-2.jpg" alt="Formula 1 racing car wallpaper">
</div>

<div class="wallpaper">
<img src="images/formula/f1-3.jpg" alt="Red Formula 1 racing wallpaper">
</div>

<div class="wallpaper">
<img src="images/formula/f1-4.jpg" alt="Formula 1 pit stop wallpaper">
</div>

<div class="wallpaper">
<img src="images/formula/f1-5.jpg" alt="Formula racing track wallpaper">
</div>

<div class="wallpaper">
<img src="images/formula/f1-6.png" alt="Formula 1 race wallpaper">
</div>

<div class="wallpaper">
<img src="images/formula/f1-7.jpg" alt="Formula 1 car close wallpaper">
</div>

<img src="images/formula/f1-movie.jpg" alt="Formula 1 movie wallpaper">

<!-- PAGINATION -->

<div class="pagination">
<a href="#">Previous</a>
<a class="active" href="cars.html">1</a>

</div>


<!-- POPUP VIEWER -->

<div id="popup" class="image-popup">
<img id="popup-img">
<a id="download-btn" download>Download Wallpaper</a>
</div>


<script>

const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");
const downloadBtn = document.getElementById("download-btn");

let zoomed = false;

document.querySelectorAll(".wallpaper img").forEach(img => {

img.addEventListener("click", () => {

popup.style.display = "flex";

popupImg.src = img.src;

downloadBtn.href = img.src;

zoomed = false;

popupImg.style.transform = "scale(1)";

});

});

popupImg.addEventListener("click", (e) => {

e.stopPropagation();

zoomed = !zoomed;

if(zoomed){

popupImg.style.transform = "scale(2)";

popupImg.style.cursor = "zoom-out";

}

else{

popupImg.style.transform = "scale(1)";

popupImg.style.cursor = "zoom-in";

}

});

popup.addEventListener("click", () => {

popup.style.display = "none";

});

</script>

</body>

</html>
