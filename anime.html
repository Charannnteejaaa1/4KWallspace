<!DOCTYPE html>
<html>
<head>
<title>Anime Wallpapers</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
<h1><a href="index.html" class="logo">4KWallSpace</a></h1>

<nav>
<a href="index.html">Home</a>
<a href="anime.html">Anime</a>
<a href="cars.html">Cars</a>
<a href="fourk.html">4K</a>
</nav>
</header>

<section class="hero">
<h2>Anime Wallpapers</h2>
</section>

<section class="wallpaper-grid">

<div class="wallpaper">
<img src="images/anime/anime1.jpg" alt="Anime wallpaper 1">
</div>

<div class="wallpaper">
<img src="images/anime/anime2.jpg" alt="Anime wallpaper 2">
</div>

<div class="wallpaper">
<img src="images/anime/anime3.jpg" alt="Anime wallpaper 3">
</div>

<div class="wallpaper">
<img src="images/anime/anime4.jpg" alt="Anime wallpaper 4">
</div>

<div class="wallpaper">
<img src="images/anime/anime5.jpg" alt="Anime wallpaper 5">
</div>

<div class="wallpaper">
<img src="images/anime/anime6.jpg" alt="Anime wallpaper 6">
</div>

</section>

<div class="pagination">
<a href="#">Previous</a>
<a class="active" href="anime.html">1</a>
<a href="anime-page2.html">2</a>
<a href="anime-page3.html">3</a>
<a href="anime-page2.html">Next</a>
</div>

<div id="popup" class="image-popup">
<img id="popup-img">
<a id="download-btn" download>Download Wallpaper</a>
</div>

<script>
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");
const downloadBtn = document.getElementById("download-btn");
let zoomed = false;

document.querySelectorAll(".wallpaper img").forEach(img => {
img.addEventListener("click", () => {
popup.style.display = "flex";
popupImg.src = img.src;
downloadBtn.href = img.src;
zoomed = false;
popupImg.style.transform = "scale(1)";
});
});

popupImg.addEventListener("click", (e)=>{
e.stopPropagation();
zoomed = !zoomed;
popupImg.style.transform = zoomed ? "scale(2)" : "scale(1)";
});

popup.addEventListener("click", ()=>{
popup.style.display = "none";
});
</script>

</body>
</html>
