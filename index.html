<script>

/* POPUP VIEWER */

const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");
const downloadBtn = document.getElementById("download-btn");
let zoomed = false;
document.querySelectorAll(".wallpaper img").forEach(img => {
img.addEventListener("click", () => {
popup.style.display = "flex";
popupImg.src = img.src;
downloadBtn.href = img.src;
zoomed = false;
popupImg.style.transform = "scale(1)";

});

});


popupImg.addEventListener("click",(e)=>{
e.stopPropagation();
zoomed = !zoomed;
if(zoomed){
popupImg.style.transform="scale(2)";

}

else{

popupImg.style.transform="scale(1)";

}

});


popup.addEventListener("click",()=>{
popup.style.display="none";

});


/* SEARCH FUNCTION */

const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("keyup", function(){
const value = this.value.toLowerCase();
document.querySelectorAll(".wallpaper").forEach(card=>{
const img = card.querySelector("img");
const keywords = (img.alt + " " + img.title).toLowerCase();
if(keywords.includes(value)){
card.style.display="block";

}

else{

card.style.display="none";

}

});

});

</script>
